<div class="col-12 header-toolbar d-flex">
  <mat-toolbar color="primary">
    <button
      mat-icon-button
      [matMenuTriggerFor]="menu"
      aria-label="Menu"
    >
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      @if (showSignOut()) {
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign Out</span>
        </button>
      }
      <button mat-menu-item (click)="donateToDeveloper()">
        <mat-icon>volunteer_activism</mat-icon>
        <span>Donate</span>
      </button>
      <button mat-menu-item (click)="shareSite()">
        <mat-icon>share</mat-icon>
        <span>Share</span>
      </button>
    </mat-menu>

    <span class="header-txt cursor-pointer flex items-center">
      <div class="header-title bg-gradient-to-r from-purple-600 to-blue-600 text-transparent bg-clip-text">
        <div class="title-main">Team Calendar</div>
        @if (isDemoMode()) {
          <div class="title-sub text-orange-400 font-semibold">Demo Mode</div>
        }
      </div>
    </span>
    <span class="header-spacer"></span>

<!-- Navigation Buttons (only if authenticated or demo mode) -->
    @if (showSignOut() || isDemoMode()) {
      <button 
        mat-icon-button 
        routerLink="/home" 
        [queryParamsHandling]="'merge'"
        [disabled]="isCalendarActive()"
        matTooltip="Calendar"
        class="nav-button"
      >
        <mat-icon>calendar_today</mat-icon>
      </button>

      <button 
        mat-icon-button 
        routerLink="/dashboard" 
        [queryParamsHandling]="'merge'"
        [disabled]="isDashboardActive()"
        matTooltip="Analytics"
        class="nav-button nav-button-mobile"
      >
        <mat-icon>analytics</mat-icon>
      </button>
    }
  </mat-toolbar>
</div>
