<div class="col-12 header-toolbar d-flex">
  <mat-toolbar color="primary">
    <button
      mat-icon-button
      [matMenuTriggerFor]="menu"
      aria-label="Menu"
    >
      <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      @if (showSignOut()) {
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign Out</span>
        </button>
      }
      <button mat-menu-item (click)="donateToDeveloper()">
        <mat-icon>volunteer_activism</mat-icon>
        <span>Donate</span>
      </button>
      <!-- <button mat-menu-item [matMenuTriggerFor]="helpprayers">
        <mat-icon>handshake</mat-icon>
        <span>Helpful Prayers</span>
      </button> -->
    </mat-menu>
    <!-- <mat-menu #helpprayers="matMenu">
      <button mat-menu-item>Serenity Prayer</button>
      <button mat-menu-item>The Lords Prayer</button>
      <button mat-menu-item>St Francis Prayer</button>
      <button mat-menu-item>Morning Prayer</button>
      <button mat-menu-item>Night Prayer</button>
      <button mat-menu-item>
        Great Spirit Prayer
      </button>
    </mat-menu> -->

    <span class="header-txt cursor-pointer flex items-center">
      <!-- <mat-icon class="header-logo" aria-hidden="false" aria-label="Grub logo">todo</mat-icon> -->
      <div class="header-title bg-gradient-to-r from-purple-600 to-blue-600 text-transparent bg-clip-text">
        <div class="title-main">Team Calendar</div>
        @if (isDemoMode()) {
          <div class="title-sub text-orange-400 font-semibold">Demo Mode</div>
        }
      </div>
      @if (showTryDemo()) {
        <button mat-stroked-button color="accent" (click)="tryDemo()" class="ml-4">
          Try Demo
        </button>
      }
    </span>
    <span class="header-spacer"></span>

<!-- Navigation Buttons (only if authenticated or demo mode) -->
    @if (showSignOut() || isDemoMode()) {
      <button 
        mat-icon-button 
        routerLink="/calendar" 
        [queryParamsHandling]="'merge'"
        [disabled]="isCalendarActive()"
        matTooltip="Calendar"
        class="nav-button"
      >
        <mat-icon>calendar_today</mat-icon>
      </button>

      <button 
        mat-icon-button 
        routerLink="/dashboard" 
        [queryParamsHandling]="'merge'"
        [disabled]="isDashboardActive()"
        matTooltip="Analytics"
        class="nav-button"
      >
        <mat-icon>analytics</mat-icon>
      </button>
    }

    <button mat-icon-button aria-label="Share" (click)="shareSite()">
      <mat-icon>share</mat-icon>
    </button>
  </mat-toolbar>
</div>
