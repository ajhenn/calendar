<div class="calendar-dialog-header">
  <h2 mat-dialog-title>Reset Password</h2>
  <button mat-icon-button (click)="closeDialog()">
    <mat-icon mat-dialog-close>close</mat-icon>
  </button>
</div>
<mat-dialog-content>
  <form (submit)="forgotPassword($event)">

    <mat-form-field appearance="outline" class="calendar-dialog-fw">
      <mat-label>Email</mat-label>
      <input matInput type="email" [formField]="forgotPwForm.email"
        placeholder="you@example.com" autocomplete="email">
    </mat-form-field>
    @if (forgotPwForm.email().touched() && forgotPwForm.email().invalid()) {
      @for (error of forgotPwForm.email().errors(); track error) {
        <mat-error class="text-sm pl-2">{{ error.message }}</mat-error>
      }
    }

      @if (forgotError()) {
        <mat-error class="text-sm pl-2">{{ forgotError() }}</mat-error>
      }

      <div class="pt-4 flex justify-end">
        <button mat-button class="calendar-cancel-btn" type="button" (click)="closeDialog()">Cancel</button>
        <button mat-flat-button type="submit">Send Reset Email</button>
      </div>

  </form>
</mat-dialog-content>
