@if (calendarVisible()) {
    @if (isMobile()) {
        <div class="calendar-mobile-banner" role="status" aria-live="polite">
            Mobile view enabled—default list week. Use the buttons below to switch views.
        </div>
    }

    <div class="calendar-container">
        <full-calendar [options]="calendarOptions()">
            <ng-template #eventContent let-arg>
                <b>{{arg.timeText}}</b>
                <i>{{arg.event.title}}</i>
            </ng-template>
        </full-calendar>
    </div>
}
